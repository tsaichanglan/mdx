# Config for verifying the deep-learned ARA channel estimator on a CDL channel.
# Single-user, single UE antenna port so that the (precoding-free) effective
# channel equals the physical channel and aligns with the estimator layout,
# which makes supervised training / MSE evaluation of the estimator exact.

[global]
label = 'ara_cdl'
ebno = True

[system]
n_size_bwp = 4
num_rx_antennas = 4
mcs_index = [9]             # QPSK
mcs_table = 1
carrier_frequency = 2140000000.0
subcarrier_spacing = 30000.0
n_start_grid = 0
slot_number = 0
frame_number = 0
cyclic_prefix = 'normal'
precoding = 'codebook'
n_cell_id = 1
tpmi = 2
symbol_allocation = [0, 14]
num_antenna_ports = 1
dmrs_mapping_type = "A"
dmrs_config_type = 1
dmrs_type_a_position = 2
dmrs_additional_position = 1
dmrs_length = 1
dmrs_nid = [[1, 1]]
n_scid = 1
num_cdm_groups_without_data = 2
verbose = False
dmrs_port_sets = [[0]]
n_rntis = [1]
n_ids = [1]

[baseline]
demapping_type = 'maxlog'
num_bp_iter = 20
cn_type = 'boxplus'
lmmse_num_prbs = -1

# ARA channel estimator hyper-parameters
ara_base_channels = 16
ara_dropout_rate = 0.0
ara_use_attention = True

[neural_receiver]
num_nrx_iter = 8
num_nrx_iter_eval = 8
d_s = 56
num_units_init = [128, 128]
num_units_agg = [[64], [64], [64], [64],[64], [64], [64], [64]]
num_units_state = [[128, 128], [128, 128], [128, 128], [128, 128], [128, 128], [128, 128], [128, 128], [128, 128]]
num_units_readout = [128]
max_num_tx = 1
min_num_tx = 1
initial_chest = "ls"
custom_constellation = False
mask_pilots = False
mcs_var_mcs_masking = True
layer_type_dense = "dense"
layer_type_conv = "sepconv"
layer_type_readout = "dense"
nrx_dtype = tf.float32

[training]
training_schedule = {
    "num_iter": [1e6, 9e6],
    "learning_rate": [0.001, 0.001],
    "batch_size": [128, 128],
    "train_tx": [False, False],
    "min_training_snr_db": [[-2.], [-1.]],
    "max_training_snr_db": [[12.], [12.]],
    "double_readout": [True, True],
    "weighting_double_readout": [0.02, 0.01],
    "apply_multiloss": [True, True]}

mcs_training_snr_db_offset = [[0.0], [0.0]]

num_iter_train_save = 1000
max_ut_velocity = 56.
min_ut_velocity = 0.
channel_norm = False
cfo_offset_ppm = 0.0
channel_type = 'CDL-C'
eval_ebno_db_arr = [4.0]
xla = True
tfrecord_filename = "na"
double_readout = True

[evaluation]
snr_db_eval_min = -5
snr_db_eval_max = 12
snr_db_eval_stepsize = 1
max_ut_velocity_eval = 3.
min_ut_velocity_eval = 0.
cfo_offset_ppm_eval = 0.0
tfrecord_filename_eval = "na"
channel_type_eval = "CDL-C"
channel_norm_eval = False
n_size_bwp_eval = 4
batch_size_eval = 30
batch_size_eval_small = 3
